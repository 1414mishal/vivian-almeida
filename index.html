    <!-- Inline splash styles — applied before the main bundle loads so the
         brand mark is visible during JS bootstrap. Removed by main.tsx
         once React renders. -->
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #fcfdfe;
        transition: opacity 0.55s ease, visibility 0.55s ease;
        font-family: Geist, Inter, system-ui, -apple-system, sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        #splash {
          background: #08132a;
        }
      }
      #splash[data-ready="true"] {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .splash-stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
        animation: splash-in 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .splash-logo {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: rgba(65, 228, 192, 0.12);
        border: 1px solid rgba(65, 228, 192, 0.4);
        display: grid;
        place-items: center;
        box-shadow: 0 0 32px -8px rgba(65, 228, 192, 0.5);
        animation: splash-pulse 2.4s ease-in-out infinite;
      }
      .splash-logo svg {
        width: 28px;
        height: 28px;
        transform: rotate(-45deg);
        color: #41e4c0;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .splash-name {
        font-weight: 700;
        font-size: 1.05rem;
        letter-spacing: -0.01em;
        color: rgb(34, 47, 62);
      }
      @media (prefers-color-scheme: dark) {
        .splash-name {
          color: rgb(217, 226, 255);
        }
      }
      .splash-bar {
        position: relative;
        width: 180px;
        height: 2px;
        border-radius: 9999px;
        background: rgba(65, 228, 192, 0.18);
        overflow: hidden;
      }
      .splash-bar::after {
        content: "";
        position: absolute;
        inset: 0;
        width: 38%;
        background: linear-gradient(90deg, transparent, #41e4c0, transparent);
        animation: splash-slide 1.3s ease-in-out infinite;
      }
      @keyframes splash-in {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes splash-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(360%); }
      }
      @media (prefers-reduced-motion: reduce) {
        .splash-logo, .splash-bar::after, .splash-stack {
          animation: none !important;
        }
      }
    </style>
